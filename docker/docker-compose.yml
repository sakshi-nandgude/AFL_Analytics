services:

  postgres:

    image: postgres:16

    container_name: afl-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: afl_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afl_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - afl-network



  backend:

    build:
      context: ..
      dockerfile: docker/Dockerfile.backend

    container_name: afl-backend

    restart: unless-stopped

    env_file:
      - ../backend/.env.docker

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    networks:
      - afl-network



  frontend:

    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend

    container_name: afl-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "5173:5173"

    networks:
      - afl-network



volumes:

  postgres_data:



networks:

  afl-network:
    driver: bridge