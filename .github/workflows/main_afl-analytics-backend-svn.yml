name: Deploy FastAPI Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CABF23AA3CEF4081BD51E28BF5864188 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5D9CDAB6B1D345B7929AD55876EAC220 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EDDB8C477C8C4C89A12775AF3AD7EBC6 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: afl-analytics-backend-svn
          package: backend